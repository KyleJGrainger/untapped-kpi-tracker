<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Untapped — Admin Console</title>
<style>
  :root{--ink:#101820;--bg:#0f1116;--panel:#161a22;--line:#272c37;--muted:#8b8f9a;--red:#DA291C;--org:#FF6900;--yel:#FFC600;--grn:#34c759}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#eef0f3;font-family:Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5}
  .top{background:var(--ink);padding:16px 26px;display:flex;align-items:center;justify-content:space-between}
  .top .brand{color:#fff;font-weight:700;font-size:20px;letter-spacing:.02em}
  .top .brand span{color:var(--org)}
  .top .lab{color:var(--muted);font-size:12px;letter-spacing:.16em;text-transform:uppercase;margin-left:10px}
  .heatrule{height:4px;background:linear-gradient(90deg,var(--yel),var(--org),var(--red))}
  .wrap{max-width:960px;margin:0 auto;padding:26px}
  h1{font-family:'Iowan Old Style',Georgia,serif;font-weight:600}
  .center{min-height:70vh;display:flex;align-items:center;justify-content:center}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px}
  label.fl{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 5px}
  input,select{width:100%;background:#0d0f14;border:1px solid var(--line);border-radius:9px;color:#fff;padding:11px 12px;font-size:15px}
  .pin{letter-spacing:.4em;text-align:center;font-size:20px}
  .btn{background:#fff;color:#101820;border:0;border-radius:9px;padding:12px 18px;font-weight:700;font-size:15px;cursor:pointer}
  .btn.dark{background:var(--ink);color:#fff}
  .btn.sm{padding:8px 12px;font-size:13px}
  .btn.ghost{background:transparent;color:#eef0f3;border:1px solid var(--line)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .err{color:#ff6b6b;font-size:13px;margin:8px 0;min-height:16px}
  .muted{color:var(--muted)}
  .tabs{display:flex;gap:6px;margin:18px 0}
  .tab{background:transparent;border:0;color:var(--muted);font-size:15px;padding:8px 4px;margin-right:18px;cursor:pointer;border-bottom:2px solid transparent}
  .tab.on{color:#fff;border-bottom-color:var(--yel)}
  .month{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:22px 0 8px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .client{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .client b{font-size:16px}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .b-sent{background:rgba(218,41,28,.16);color:#ff8a80}
  .b-mid{background:rgba(255,105,0,.16);color:#ffb27a}
  .b-active{background:rgba(52,199,89,.16);color:#7ee2a0}
  .share{background:#0d0f14;border:1px dashed var(--line);border-radius:9px;padding:10px 12px;font-size:13px;word-break:break-all;margin-top:8px}
  .empty{color:var(--muted);padding:20px;text-align:center}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#fff;color:#101820;padding:10px 18px;border-radius:8px;font-weight:600;opacity:0;transition:.2s;pointer-events:none}
  .toast.on{opacity:1}
</style></head>

<div class="wrap" id="app"></div>

function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),1800);}
async function api(action,extra){const r=await fetch(EP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,adminKey:KEY,...(extra||{})})});let j={};try{j=await r.json()}catch(e){}if(!r.ok)j.error=j.error||('HTTP '+r.status);return j;}
function copy(t){navigator.clipboard&&navigator.clipboard.writeText(t);toast('Copied');}

const STAGES={ 'sent':['Awaiting signature','b-sent'], 'paid':['Signed · awaiting payment','b-mid'], 'questionnaire':['Paid · awaiting questionnaire','b-mid'], 'booked':['Awaiting kick-off booking','b-mid'], 'shortlist':['Shortlist stage','b-mid'], 'workorder':['Awaiting Work Order','b-mid'], 'directdebit':['Awaiting Direct Debit','b-mid'], 'active':['Active','b-active'], 'no-onboarding':['No onboarding','b-mid'] };

async function init(){
  let s=null; try{s=sessionStorage.getItem('untapped_admin_key')}catch(e){}
  const st=await api('adminStatus');
  if(!st.setup){ return bootstrapView(); }
  if(s){ KEY=s; const chk=await api('adminStatus'); if(chk.authed){ return console_(); } KEY=null; }
  keyView();
}
function bootstrapView(){
  $('#topr').innerHTML='';
  el.innerHTML=`<div class="center"><div class="card" style="max-width:420px;width:100%">
    <div class="lab" style="color:var(--muted);font-size:12px;letter-spacing:.14em;text-transform:uppercase">First-time setup</div>
    <h1 style="font-size:23px;margin:6px 0 10px">Create your admin PIN</h1>
    <p class="muted" style="font-size:14px">Set a private PIN for you and your VA. You'll use it to open this console. Keep it separate from client PINs.</p>
    <label class="fl">Admin PIN (4–8 digits)</label><input id="bk" class="pin" maxlength="8" inputmode="numeric" placeholder="••••">
    <div class="err" id="be"></div>
    <button class="btn" style="width:100%" onclick="doBootstrap()">Set admin PIN →</button>
  </div></div>`;
}
async function doBootstrap(){const v=$('#bk').value.trim();if(!/^\d{4,8}$/.test(v)){$('#be').textContent='4–8 digits.';return;}const j=await api('adminBootstrap',{adminKey:v});if(j.ok){KEY=v;try{sessionStorage.setItem('untapped_admin_key',v)}catch(e){}console_();}else $('#be').textContent=j.error||'Failed';}
function keyView(){
  $('#topr').innerHTML='';
  el.innerHTML=`<div class="center"><div class="card" style="max-width:380px;width:100%;text-align:center">
    <h1 style="font-size:22px;margin:0 0 10px">Admin sign-in</h1>
    <p class="muted" style="font-size:13px">Enter your Untapped admin PIN.</p>
    <input id="k" class="pin" maxlength="8" inputmode="numeric" placeholder="••••" style="margin-top:12px">
    <div class="err" id="ke"></div>
    <button class="btn" style="width:100%" onclick="doKey()">Unlock →</button>
  </div></div>`;
  const k=$('#k');k.focus();k.addEventListener('keydown',e=>{if(e.key==='Enter')doKey();});
}
async function doKey(){KEY=$('#k').value.trim();const j=await api('adminStatus');if(j.authed){try{sessionStorage.setItem('untapped_admin_key',KEY)}catch(e){}console_();}else{KEY=null;$('#ke').textContent='Incorrect PIN.';}}

let view='clients';
function console_(){
  $('#topr').innerHTML=`<button class="btn ghost sm" onclick="lock()">Lock</button>`;
  el.innerHTML=`<div class="row" style="justify-content:space-between">
      <div class="tabs"><button class="tab ${view==='clients'?'on':''}" onclick="go('clients')">Clients</button><button class="tab ${view==='new'?'on':''}" onclick="go('new')">+ New client</button></div>
    </div><div id="body"></div>`;
  if(view==='new') newClientForm(); else clientsView();
}
function go(v){view=v;console_();}
function lock(){KEY=null;try{sessionStorage.removeItem('untapped_admin_key')}catch(e){}keyView();$('#topr').innerHTML='';}

function monthKey(iso){const d=new Date(iso);return isNaN(d)?'Unknown':d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});}
const KCOLS=[['sent','Awaiting signature'],['paid','Awaiting payment'],['questionnaire','Questionnaire'],['booked','Kick-off booking'],['shortlist','Shortlist'],['workorder','Work Order'],['directdebit','Direct Debit'],['active','Active']];
let clientView_mode='board';
async function clientsView(){
  const box=$('#body');box.innerHTML='<div class="empty">Loading…</div>';
  const j=await api('adminList');
  if(!j.ok){box.innerHTML='<div class="empty">'+(j.error||'Failed to load')+'</div>';return;}
  const cl=(j.clients||[]).filter(c=>c.required||c.stage!=='no-onboarding');
  const outstanding=cl.filter(c=>c.required&&!c.signed).length;
  if(!cl.length){box.innerHTML='<div class="empty">No clients yet. Use “+ New client” to set one up.</div>';return;}
  const head=`<div class="row" style="justify-content:space-between;align-items:center;margin:2px 0 12px">
      <p class="muted" style="font-size:14px;margin:0"><b style="color:#fff">${cl.length}</b> client${cl.length===1?'':'s'} · <b style="color:#ff8a80">${outstanding}</b> outstanding MSA${outstanding===1?'':'s'}</p>
      <div class="row"><button class="btn ghost sm ${clientView_mode==='board'?'':''}" onclick="setMode('board')" style="${clientView_mode==='board'?'border-color:#FFC600;color:#fff':''}">Board</button><button class="btn ghost sm" onclick="setMode('months')" style="${clientView_mode==='months'?'border-color:#FFC600;color:#fff':''}">By month</button></div>
    </div>`;
  if(clientView_mode==='months'){
    const groups={}; cl.forEach(c=>{const m=monthKey(c.sentAt);(groups[m]=groups[m]||[]).push(c);});
    let html=head; Object.keys(groups).forEach(m=>{ html+=`<div class="month">Sent · ${m}</div>`; groups[m].forEach(c=>{ html+=clientRow(c); }); });
    box.innerHTML=html; return;
  }
  // Kanban board — a column per pipeline stage; cards click into the client
  const byStage={}; cl.forEach(c=>{(byStage[c.stage]=byStage[c.stage]||[]).push(c);});
  const cols=KCOLS.map(([key,label])=>{
    const items=byStage[key]||[];
    return `<div style="min-width:230px;width:230px;flex:0 0 auto">
      <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:6px 4px;border-bottom:2px solid var(--line);display:flex;justify-content:space-between"><span>${label}</span><span>${items.length||''}</span></div>
      <div style="padding-top:8px">${items.map(c=>kanbanCard(c)).join('')||'<div style="color:var(--line);font-size:12px;padding:10px 4px">—</div>'}</div>
    </div>`;
  }).join('');
  box.innerHTML=head+`<div style="display:flex;gap:14px;overflow-x:auto;padding-bottom:12px">${cols}</div>`;
}
function setMode(m){clientView_mode=m;clientsView();}
function kanbanCard(c){
  return `<div class="card" style="padding:12px;margin-bottom:10px;cursor:pointer;position:relative" onclick="openClient('${c.id}')">
    <button title="Delete client" onclick="event.stopPropagation();deleteClientAdmin('${c.id}')" style="position:absolute;top:6px;right:8px;background:none;border:0;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:2px 4px">×</button>
    <b style="font-size:14px;display:block;padding-right:16px">${esc(c.company||'—')}</b>
    <div class="muted" style="font-size:12px;margin-top:3px">${esc(c.region||'no region')} · £${(c.retainerTotal||0).toFixed(0)}/mo</div>
    <div class="muted" style="font-size:11px;margin-top:5px">${c.signed?('MSA signed '+new Date(c.signed.ts).toLocaleDateString('en-GB')):'Sent '+(c.sentAt?new Date(c.sentAt).toLocaleDateString('en-GB'):'—')}</div>
  </div>`;
}
async function deleteClientAdmin(id){
  if(!confirm('Permanently delete this client and ALL their data (candidates, CVs, signatures)? This cannot be undone.'))return;
  const j=await api('adminDeleteClient',{wsId:id});
  if(j.ok){toast('Client deleted');clientsView();}else toast(j.error||'Failed');
}
function clientRow(c){
  const st=STAGES[c.stage]||['—','b-mid']; const base=location.origin+'/?w='+c.id;
  return `<div class="client"><div>
      <b>${esc(c.company||'—')}</b> <span class="muted">· ${esc(c.region||'no region')} · £${(c.retainerTotal||0).toFixed(0)}</span>
      ${c.signed?`<div class="muted" style="font-size:12px;margin-top:3px">MSA signed by ${esc(c.signed.name)} on ${new Date(c.signed.ts).toLocaleDateString('en-GB')}</div>`:`<div class="muted" style="font-size:12px;margin-top:3px">MSA not signed yet</div>`}
    </div>
    <div class="row"><span class="badge ${st[1]}">${st[0]}</span><button class="btn ghost sm" onclick="event.stopPropagation();copy('${base}')">Copy link</button><button class="btn sm" onclick="openClient('${c.id}')">Open</button></div>
  </div>`;
}

async function openClient(id){
  view='client';$('#topr').innerHTML=`<button class="btn ghost sm" onclick="lock()">Lock</button>`;
  el.innerHTML=`<button class="tab" onclick="go('clients')">← Back to clients</button><div id="body"><div class="empty">Loading…</div></div>`;
  const j=await api('adminGetClient',{wsId:id});
  const box=$('#body');
  if(!j.ok){box.innerHTML='<div class="empty">'+(j.error||'Failed')+'</div>';return;}
  const c=j.client; window.__client=c;
  const step=(ok,label)=>`<span class="badge ${ok?'b-active':'b-sent'}" style="margin-right:6px">${ok?'✓':'○'} ${label}</span>`;
  const cards=(c.shortlist||[]).map(cand=>{
    const reqs=(cand.requests||[]).map(r=>r.label).filter((v,i,a)=>a.indexOf(v)===i);
    const cvUrl='/.netlify/functions/cv?w='+encodeURIComponent(c.id)+'&c='+encodeURIComponent(cand.id);
    return `<div class="card" style="margin-top:10px">
      <div class="row" style="justify-content:space-between;align-items:flex-start">
        <div><b style="font-size:16px">${esc(cand.name)}</b>${cand.commentary?`<div class="muted" style="font-size:13px;margin-top:3px">“${esc(cand.commentary)}”</div>`:''}</div>
        <div class="row">${(c.hired&&c.hired.candidateId===cand.id)?'<span class="badge b-active">★ Hired</span>':`<button class="btn sm" onclick="setHired('${c.id}','${cand.id}')">Mark as hired</button>`}<button class="btn ghost sm" style="border-color:#DA291C;color:#ff8a80" onclick="removeCand('${c.id}','${cand.id}')">Remove</button></div>
      </div>
      <div style="margin-top:10px;font-size:14px" class="muted">Salary £${(cand.salary||0).toLocaleString('en-GB')}/mo → service charge ${Math.round(cand.pct*100)}% + ${esc(cand.feeLabel)} £${cand.fee} → <b style="color:#fff">client sees £${(cand.totalCost||0).toLocaleString('en-GB',{maximumFractionDigits:0})}/mo</b></div>
      <div class="grid2" style="margin-top:10px">
        <div><label class="fl">Update salary (£/mo)</label><input type="number" min="0" step="50" id="sal_${cand.id}" value="${cand.salary||0}"></div>
        <div style="display:flex;align-items:flex-end;gap:8px">
          <button class="btn sm" onclick="saveSalary('${c.id}','${cand.id}')">Save salary</button>
          <label class="btn ghost sm" style="cursor:pointer">${cand.hasCV?'Replace CV':'Upload CV'}<input type="file" accept="application/pdf" style="display:none" onchange="uploadCV('${c.id}','${cand.id}',this)"></label>
        </div>
      </div>
      ${cand.hasCV?`<div class="muted" style="font-size:12px;margin-top:8px">CV uploaded · <a href="${cvUrl}" target="_blank" style="color:#ffb27a">view</a></div>`:'<div class="muted" style="font-size:12px;margin-top:8px">No CV uploaded yet.</div>'}
      ${reqs.length?`<div style="margin-top:8px"><span class="badge b-active">Client requested: ${reqs.map(esc).join(' · ')}</span></div>`:''}
    </div>`;
  }).join('')||'<div class="empty">No candidates presented yet. Add one below.</div>';
  box.innerHTML=`
    <h1 style="font-size:23px;margin:6px 0 2px">${esc(c.company)}</h1>
    <p class="muted" style="font-size:13px">${esc(c.region||'—')} · retainer £${((c.vat?c.retainerPerHire*c.hires*1.2:c.retainerPerHire*c.hires)||0).toFixed(0)} · <a href="${location.origin+'/?w='+c.id}" target="_blank" style="color:#ffb27a">client link ↗</a></p>
    <div style="margin:12px 0">${step(!!c.signed,'MSA signed')}${step(!!c.paid,'Retainer paid')}${step(!!c.questionnaireDone,'Questionnaire')}${step(!!c.booked,'Kick-off booked')}${step(!!c.hired,'Hired')}${step(!!c.woDone,'Work Order')}${step(!!c.ddDone,'Direct Debit')}</div>
    <div class="month">Agreements &amp; signatures</div>
    <div class="card">
      <b style="font-size:15px">Master Services Agreement (${esc(c.region||'—')})</b>
      <div class="muted" style="font-size:13px;margin-top:8px">Client: ${c.signed?`${esc(c.signed.name)} · ${new Date(c.signed.ts).toLocaleString('en-GB')}`:'not signed yet'}</div>
      <div class="muted" style="font-size:13px;margin-top:4px">Untapped: ${c.msaCountersign?`${esc(c.msaCountersign.name)} (${esc(c.msaCountersign.title)}) · ${new Date(c.msaCountersign.ts).toLocaleString('en-GB')}`:'not counter-signed'}</div>
      <div class="row" style="margin-top:10px">
        <a class="btn ghost sm" href="/${c.region==='Philippines'?'msa-philippines.html':'msa-south-africa.html'}" target="_blank">View MSA</a>
        ${c.msaCountersign?'':`<button class="btn sm" onclick="countersignMSA('${c.id}')" ${c.signed?'':'disabled title="client has not signed yet"'}>Counter-sign as Untapped</button>`}
        ${(c.signed&&c.msaCountersign)?`<button class="btn ghost sm" onclick="printRecord('${c.id}','msa')">Print signed record</button>`:''}
      </div>
    </div>
    <div class="month">Candidate shortlist</div>
    ${cards}
    ${c.hired?workOrderEditor(c):''}
    <div class="card" style="margin-top:14px">
      <b style="font-size:15px">Add a candidate</b>
      <div class="grid2" style="margin-top:10px">
        <div><label class="fl">Name</label><input id="nc_name" placeholder="Candidate name"></div>
        <div><label class="fl">Salary (£/mo)</label><input id="nc_sal" type="number" min="0" step="50" value="0"></div>
      </div>
      <label class="fl">Commentary (the pill the client sees)</label><input id="nc_comm" placeholder="e.g. 6 yrs SaaS support, immediate start">
      <div class="err" id="nc_err"></div>
      <button class="btn sm" style="margin-top:6px" onclick="addCand('${c.id}')">Add candidate</button>
      <p class="muted" style="font-size:12px;margin-top:6px">Add the candidate, then use “Upload CV” on their card to attach the profile PDF.</p>
    </div>`;
}
function workOrderEditor(c){
  const wo=c.workOrder||{}; const cl=wo.client||{};
  return `<div class="month">Work Order — ${esc((c.hired&&c.hired.name)||'the hire')}</div>
    <div class="card">
      <p class="muted" style="font-size:13px;margin:0 0 10px">Fill in the hire details below. The client sees these (read-only) in their funnel, adds their own company details, and signs.</p>
      <div class="grid2">
        <div><label class="fl">Job title</label><input id="wo_jt" value="${esc(wo.jobTitle||'')}"></div>
        <div><label class="fl">Start date</label><input id="wo_sd" value="${esc(wo.startDate||'')}" placeholder="e.g. 1 Aug 2026"></div>
      </div>
      <div class="grid2">
        <div><label class="fl">Gross salary (£/mo)</label><input id="wo_gs" type="number" min="0" step="50" value="${Number(wo.grossSalaryMonthly)||0}"></div>
        <div><label class="fl">Notice period</label><input id="wo_np" value="${esc(wo.noticePeriod||'1 Calendar Month')}"></div>
      </div>
      <div class="grid2">
        <div><label class="fl">Annual leave (days)</label><input id="wo_al" type="number" min="0" value="${wo.annualLeaveDays!=null?wo.annualLeaveDays:15}"></div>
        <div><label class="fl">Sick leave (days)</label><input id="wo_sl" type="number" min="0" value="${wo.sickLeaveDays!=null?wo.sickLeaveDays:12}"></div>
      </div>
      <label class="fl">Job description</label><textarea id="wo_jd" style="width:100%;min-height:70px;background:#0d0f14;border:1px solid var(--line);border-radius:9px;color:#fff;padding:10px">${esc(wo.jobDescription||'')}</textarea>
      <label class="fl">Commission / bonus details (optional)</label><input id="wo_cd" value="${esc(wo.commissionDetails||'')}">
      <button class="btn sm" style="margin-top:10px" onclick="saveWO('${c.id}')">Save Work Order details</button>
      ${wo.signed?`<div class="card" style="margin-top:12px;background:#0d0f14"><b style="font-size:14px;color:#7ee2a0">✓ Signed by the client</b>
        <div class="muted" style="font-size:13px;margin-top:6px">Signed by ${esc(wo.signed.name)} · ${new Date(wo.signed.ts).toLocaleString('en-GB')}</div>
        <div class="muted" style="font-size:13px;margin-top:6px">${esc(cl.companyName||'')} · Reg ${esc(cl.companyRegNumber||'')}<br>${esc(cl.companyAddress||'')}<br>Contact: ${esc(cl.contactName||'')} · ${esc(cl.hiringManagerEmail||'')}<br>Accounts: ${esc(cl.accountsEmail||'')}</div>
        <div class="muted" style="font-size:13px;margin-top:8px">Untapped: ${wo.untappedSigned?`${esc(wo.untappedSigned.name)} (${esc(wo.untappedSigned.title)}) · ${new Date(wo.untappedSigned.ts).toLocaleString('en-GB')}`:'not counter-signed'}</div>
        <div class="row" style="margin-top:10px">${wo.untappedSigned?`<button class="btn ghost sm" onclick="printRecord('${c.id}','wo')">Print signed record</button>`:`<button class="btn sm" onclick="countersignWO('${c.id}')">Counter-sign Work Order as Untapped</button>`}</div></div>`
        :'<div class="muted" style="font-size:12px;margin-top:8px">Awaiting the client to add their details &amp; sign in their funnel.</div>'}
    </div>`;
}
async function countersignMSA(id){const name=prompt('Counter-sign the MSA as Untapped. Your name:','Kyle Grainger');if(!name)return;const title=prompt('Your title:','CEO')||'CEO';const j=await api('adminCountersignMSA',{wsId:id,name,title});if(j.ok){toast('MSA counter-signed');openClient(id);}else toast(j.error||'Failed');}
async function countersignWO(id){const name=prompt('Counter-sign the Work Order as Untapped. Your name:','Kyle Grainger');if(!name)return;const title=prompt('Your title:','CEO')||'CEO';const j=await api('adminCountersignWO',{wsId:id,name,title});if(j.ok){toast('Work Order counter-signed');openClient(id);}else toast(j.error||'Failed');}
function printRecord(id,kind){
  const c=window.__client||{}; const wo=c.workOrder||{}; const cl=wo.client||{};
  const fmt=t=>t?new Date(t).toLocaleString('en-GB'):'—';
  const rows=kind==='wo'?`
    <tr><td>Employee</td><td>${esc(wo.employeeName||'')}</td></tr>
    <tr><td>Job title</td><td>${esc(wo.jobTitle||'')}</td></tr>
    <tr><td>Start date</td><td>${esc(wo.startDate||'')}</td></tr>
    <tr><td>Gross salary</td><td>£${(Number(wo.grossSalaryMonthly)||0).toLocaleString('en-GB')}/mo</td></tr>
    <tr><td>Notice period</td><td>${esc(wo.noticePeriod||'')}</td></tr>
    <tr><td>Client company</td><td>${esc(cl.companyName||'')} (Reg ${esc(cl.companyRegNumber||'')})</td></tr>
    <tr><td>Client address</td><td>${esc(cl.companyAddress||'')}</td></tr>
    <tr><td>Contacts</td><td>${esc(cl.hiringManagerEmail||'')} · ${esc(cl.accountsEmail||'')}</td></tr>`:`
    <tr><td>Agreement</td><td>Master Services Agreement — ${esc(c.region||'')}</td></tr>`;
  const clientSig=kind==='wo'?wo.signed:c.signed; const untappedSig=kind==='wo'?wo.untappedSigned:c.msaCountersign;
  const title=kind==='wo'?'Work Order':'Master Services Agreement';
  const w=window.open('','_blank'); if(!w){toast('Allow pop-ups to print');return;}
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>${title} — ${esc(c.company||'')}</title>
    <style>body{font-family:Helvetica,Arial,sans-serif;color:#101820;max-width:720px;margin:24px auto;padding:0 20px;line-height:1.5}
    .r{height:4px;background:linear-gradient(90deg,#FFC600,#FF6900,#DA291C);border-radius:2px;margin-bottom:16px}
    h1{font-size:22px}table{width:100%;border-collapse:collapse;margin:14px 0}td{padding:7px 6px;border-bottom:1px solid #eee;font-size:14px;vertical-align:top}td:first-child{color:#777;width:38%}
    .sigs{display:flex;gap:24px;margin-top:26px}.sig{flex:1;border-top:2px solid #101820;padding-top:8px;font-size:13px}</style></head>
    <body><div class="r"></div><div style="font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#777">Untapped · Signed record</div>
    <h1>${title} — ${esc(c.company||'')}</h1>
    <table>${rows}</table>
    <div class="sigs">
      <div class="sig"><b>Customer</b><br>${esc((clientSig||{}).name||'—')}<br>${fmt((clientSig||{}).ts)}${(clientSig&&clientSig.ip)?'<br>IP '+esc(clientSig.ip):''}</div>
      <div class="sig"><b>Untapped</b><br>${esc((untappedSig||{}).name||'—')}${untappedSig&&untappedSig.title?' ('+esc(untappedSig.title)+')':''}<br>${fmt((untappedSig||{}).ts)}</div>
    </div>
    <p style="color:#999;font-size:11px;margin-top:26px">Untapped · tryuntapped.com — electronic signature record</p>
    <script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}
async function setHired(id,cid){if(!confirm('Mark this candidate as hired? This moves the client to the Work Order stage.'))return;const j=await api('adminSetHired',{wsId:id,candidateId:cid});if(j.ok){toast('Marked as hired');openClient(id);}else toast(j.error||'Failed');}
async function saveWO(id){const wo={jobTitle:$('#wo_jt').value,startDate:$('#wo_sd').value,grossSalaryMonthly:$('#wo_gs').value,noticePeriod:$('#wo_np').value,annualLeaveDays:$('#wo_al').value,sickLeaveDays:$('#wo_sl').value,jobDescription:$('#wo_jd').value,commissionDetails:$('#wo_cd').value};const j=await api('adminSaveWorkOrder',{wsId:id,wo});if(j.ok){toast('Work Order saved');openClient(id);}else toast(j.error||'Failed');}
async function addCand(id){const name=$('#nc_name').value.trim(),salary=$('#nc_sal').value,commentary=$('#nc_comm').value.trim();if(!name){$('#nc_err').textContent='Enter a name.';return;}const j=await api('adminAddCandidate',{wsId:id,name,salary,commentary});if(j.ok){toast('Candidate added');openClient(id);}else $('#nc_err').textContent=j.error||'Failed';}
async function saveSalary(id,cid){const salary=$('#sal_'+cid).value;const j=await api('adminUpdateCandidate',{wsId:id,candidateId:cid,salary});if(j.ok){toast('Salary saved');openClient(id);}else toast(j.error||'Failed');}
async function removeCand(id,cid){if(!confirm('Remove this candidate from the shortlist?'))return;const j=await api('adminRemoveCandidate',{wsId:id,candidateId:cid});if(j.ok){toast('Removed');openClient(id);}else toast(j.error||'Failed');}
function uploadCV(id,cid,input){const f=input.files&&input.files[0];if(!f)return;if(f.size>6*1024*1024){toast('File too big (max 6MB)');return;}const r=new FileReader();r.onload=async()=>{toast('Uploading…');const j=await api('adminUploadCV',{wsId:id,candidateId:cid,dataBase64:String(r.result)});if(j.ok){toast('CV uploaded');openClient(id);}else toast(j.error||'Upload failed');};r.readAsDataURL(f);}

function newClientForm(){
  $('#body').innerHTML=`<div class="card" style="max-width:560px">
    <h1 style="font-size:22px;margin:0 0 4px">Set up a new client</h1>
    <p class="muted" style="font-size:13px">This creates their onboarding link, picks the right MSA + kick-off call by region, and sets the retainer. Send them the link at the end.</p>
    <label class="fl">Client company name</label><input id="c_co" placeholder="e.g. Acme Ltd">
    <label class="fl">Client email</label><input id="c_em" type="email" placeholder="ops@acme.com">
    <label class="fl">Region (sets the MSA &amp; kick-off call)</label>
    <select id="c_rg"><option value="">— choose —</option><option value="Philippines">Philippines</option><option value="South Africa">South Africa</option></select>
    <div class="grid2">
      <div><label class="fl">Retainer per hire (£)</label><input id="c_ret" type="number" min="0" step="50" value="1000" oninput="prev()"></div>
      <div><label class="fl">Number of hires</label><input id="c_h" type="number" min="1" step="1" value="1" oninput="prev()"></div>
    </div>
    <label class="row" style="align-items:center;gap:10px;margin-top:12px;cursor:pointer;font-size:15px"><input type="checkbox" id="c_vat" style="width:18px;height:18px" onchange="prev()"> Add VAT (20%)</label>
    <div style="margin-top:12px;font-size:15px">Retainer charged: <b id="c_tot">£1000</b></div>
    <div class="err" id="c_err"></div>
    <button class="btn" style="margin-top:6px" onclick="createClient()">Create client &amp; link →</button>
  </div>`;
}
function prev(){const p=Number($('#c_ret').value)||0,h=Math.max(1,Number($('#c_h').value)||1),v=$('#c_vat').checked;$('#c_tot').textContent='£'+((v?p*h*1.2:p*h)).toFixed(0);}
async function createClient(){
  const company=$('#c_co').value.trim(),customerEmail=$('#c_em').value.trim(),region=$('#c_rg').value,retainerPerHire=$('#c_ret').value,hires=$('#c_h').value,vat=$('#c_vat').checked,err=$('#c_err');
  if(!company){err.textContent='Enter the client company name.';return;}
  if(!region){err.textContent='Choose a region.';return;}
  const j=await api('adminCreateClient',{company,customerEmail,region,retainerPerHire,hires,vat});
  if(!j.ok){err.textContent=j.error||'Failed';return;}
  const link=location.origin+'/?w='+j.wsId;
  $('#body').innerHTML=`<div class="card" style="max-width:560px">
    <h1 style="font-size:22px;margin:0 0 6px">${esc(company)} is set up ✓</h1>
    <p class="muted" style="font-size:14px">Send this link to the client — it opens their branded onboarding (sign the ${esc(region)} MSA → pay → questionnaire → book kick-off call).</p>
    <div class="share"><b>Client onboarding link:</b><br>${esc(link)}</div>
    <div class="grid2" style="margin-top:12px">
      <div class="share"><b>Client PIN</b><br>${esc(j.clientPin)} <span class="muted">— their dashboard, after onboarding</span></div>
      <div class="share"><b>Candidate PIN</b><br>${esc(j.candidatePin)} <span class="muted">— the hire logs progress</span></div>
    </div>
    <div class="row" style="margin-top:16px">
      <button class="btn" onclick="copy('${link}')">Copy link</button>
      <button class="btn ghost" onclick="go('clients')">Back to clients</button>
    </div>
  </div>`;
}
init();
</script>
</body></html>
