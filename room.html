<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Untapped Collaboration Room</title>
<style>
:root{--bg:#101820;--panel:#171d25;--panel2:#1e2630;--line:#2b333d;--gold:#FFC600;--red:#DA291C;--orange:#FF6900;--white:#fff;--muted:#98a2ad;--green:#57c98a;--blue:#7fb2ff;
--sans:'Helvetica Neue',Helvetica,Arial,sans-serif;--serif:Georgia,'Times New Roman',serif}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--white);font-family:var(--sans);font-size:14px}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(circle at 85% -5%,rgba(255,105,0,.30),rgba(218,41,28,.10) 38%,transparent 68%)}
.wrap{max-width:1400px;margin:0 auto;padding:0 22px 60px;position:relative;z-index:1}
a{color:var(--blue)}
.heatrule{height:3px;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--orange),var(--red))}
.ident{position:relative;z-index:1;background:#20130c;border-bottom:1px solid var(--orange);padding:8px 20px;font-size:12.5px;color:#e9d9b0;text-align:center}
header.top{display:flex;align-items:center;justify-content:space-between;padding:20px 0 14px}
header.top img{height:34px;display:block}
.pill{border:1.5px solid var(--red);color:var(--red);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;letter-spacing:2.5px}
.rolebar{display:flex;align-items:baseline;gap:12px;margin:22px 0 4px}
.rolebar h1{font-family:var(--serif);font-size:30px;margin:0;font-weight:700}
.rolebar h1 .g{color:var(--gold)}
.sub{color:var(--muted);font-size:13px;margin:0 0 14px}
.tabs{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap}
.tabs button{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:9px 15px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600}
.tabs button.on{color:var(--bg);background:var(--gold);border-color:var(--gold)}
.lbl{color:var(--gold);font-size:12px;font-weight:700;letter-spacing:2px;margin:0 0 6px}
.rule{width:34px;height:3px;background:var(--orange);margin-bottom:12px}
.hub{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.layout{display:grid;grid-template-columns:1fr 330px;gap:16px;align-items:start}
.board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.col{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px;min-height:220px}
.col h3{font-size:11px;letter-spacing:1.4px;color:var(--gold);margin:2px 0 4px;text-transform:uppercase;font-weight:700}
.col .barunder{width:26px;height:2px;background:var(--orange);margin-bottom:10px}
.col .cnt{color:var(--muted);font-weight:400;letter-spacing:0}
.card{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:9px;cursor:grab;transition:border-color .15s}
.card:hover{border-color:var(--gold)}
.card .nm{font-weight:700;font-size:13.5px;font-family:var(--serif)}
.card .hl{color:var(--muted);font-size:11.5px;margin:3px 0 7px;line-height:1.35}
.stars{color:var(--gold);font-size:12px;letter-spacing:1px}
.tag{display:inline-block;background:#111820;border:1px solid var(--line);color:#cdd6df;border-radius:6px;padding:1px 7px;font-size:10.5px;margin:3px 3px 0 0}
.cost{color:var(--gold);font-weight:700;font-size:12.5px;margin-top:7px;font-family:var(--serif)}
.rail{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
.act{font-size:12px;color:#c7d0d9;border-left:2px solid var(--orange);padding-left:9px;margin-bottom:8px}
.act .t{color:var(--muted);font-size:10.5px}
.msg{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px;margin-bottom:7px;font-size:12.5px}
.msg .who{font-weight:700;font-size:11.5px}.msg .who span{color:var(--muted);font-weight:400}
.reply{margin-left:16px;border-left:2px solid var(--line);padding-left:8px;margin-top:6px}
.chatbox{display:flex;gap:6px;margin-top:8px}
.chatbox input{flex:1;background:var(--panel2);border:1px solid var(--line);color:#fff;border-radius:8px;padding:8px}
.btn{background:var(--gold);color:var(--bg);border:0;border-radius:9px;padding:9px 13px;font-weight:700;cursor:pointer;font-size:12.5px}
.btn.ghost{background:transparent;color:#cdd6df;border:1px solid var(--line)}
.btn.sm{padding:6px 10px;font-size:11.5px}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;z-index:20}
.drawer{position:fixed;top:0;right:0;height:100%;width:470px;max-width:94vw;background:var(--bg);border-left:1px solid var(--line);transform:translateX(100%);transition:.25s;z-index:21;overflow:auto}
.drawer .dtop{height:3px;background:linear-gradient(90deg,var(--gold),var(--orange),var(--red))}
.drawer .dpad{padding:22px}
.drawer.open{transform:none}.scrim.open{display:block}
.avatar{width:66px;height:66px;border-radius:12px;background:linear-gradient(135deg,#3a2a10,#2b333d);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:26px;color:var(--gold);font-weight:700;border:1px solid var(--line)}
.kv{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:8px 0;font-size:13px}
.kv .k{color:var(--muted)}
.acts{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.exp{font-size:12.5px;color:#cdd6df;padding:6px 0;border-bottom:1px solid var(--line)}
.exp .c{color:var(--muted);font-size:11.5px}
.dname{font-size:21px;font-weight:700;font-family:var(--serif)}
.note{background:#20130c;border:1px solid var(--orange);border-radius:9px;padding:9px 11px;color:#e9d9b0;font-size:11.5px;margin-top:12px}
.foot{color:var(--muted);font-size:11px;margin-top:26px;text-align:center}
/* gate */
.gate{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.gatebox{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px;max-width:400px;width:92%}
.gatebox img{height:32px;margin-bottom:6px}
.gatebox input{width:100%;background:var(--panel2);border:1px solid var(--line);color:#fff;border-radius:9px;padding:11px;margin-top:10px}
.muted{color:var(--muted)}
</style></head>

    <h2 style="font-family:Georgia,serif;font-weight:700;margin:14px 0 4px">Your collaboration room</h2>
    <p class="muted" style="font-size:13px;margin:0">Enter your details to access the shortlist. Your delivery team can see when you've reviewed candidates.</p>

    <input id="g_email" type="email" placeholder="Your work email">
    <div id="g_err" style="color:#e88;font-size:12px;margin-top:8px"></div>

<script>
const EP='/.netlify/functions/room';
const params=new URLSearchParams(location.search);
const ROOM_ID=params.get('r')||'ninetwenty-delivery';
let ROOM=null, VIEWER=null;
function lget(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function lset(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
async function api(action,extra){const r=await fetch(EP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,roomId:ROOM_ID,...(extra||{})})});let j={};try{j=await r.json()}catch(e){}if(!r.ok)j.error=j.error||('HTTP '+r.status);return j;}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
function stars(n){n=Number(n)||0;return "★★★★★".slice(0,n)+"☆☆☆☆☆".slice(0,5-n)}
function money(n){return "£"+(Number(n)||0).toLocaleString()}

async function boot(){
  VIEWER=lget('untapped_room_viewer_'+ROOM_ID);
  const g=await api('roomGet');
  if(g.error){document.body.innerHTML='<div style="padding:40px;font-family:sans-serif;color:#fff">Room not found.</div>';return;}
  ROOM=g.room;
  if(!VIEWER){document.getElementById('gate').style.display='flex';return;}
  await api('roomIdentify',{name:VIEWER.name,email:VIEWER.email});
  openApp();
}
async function identify(){
  const name=document.getElementById('g_name').value.trim(), email=document.getElementById('g_email').value.trim();
  if(name.length<2||!/^[^@]+@[^@]+\.[^@]+$/.test(email)){document.getElementById('g_err').textContent='Please enter your name and a valid email.';return;}
  const j=await api('roomIdentify',{name,email});
  if(j.error){document.getElementById('g_err').textContent=j.error;return;}
  VIEWER={name,email};lset('untapped_room_viewer_'+ROOM_ID,VIEWER);ROOM=j.room;
  document.getElementById('gate').style.display='none';openApp();
}
function openApp(){
  document.getElementById('app').style.display='block';
  document.getElementById('identbar').innerHTML=`🔒 Viewing as <b>${esc(VIEWER.name)}</b> · your activity is visible to the Untapped team`;
  const c=ROOM.client||{};
  const parts=(ROOM.role||'').split('—');
  document.getElementById('roleTitle').innerHTML= parts.length>1?`<span class="g">${esc(parts[0].trim())}</span> — ${esc(parts.slice(1).join('—').trim())}`:esc(ROOM.role||'Role');
  document.getElementById('roleSub').innerHTML=`Untapped × <b>${esc(c.name||'')}</b>${ROOM.owner?' · owner: '+esc(ROOM.owner):''} · synced from Atlas`;
  buildTabs();render();
}
const HUBKEYS=[['role','Role & JD','jd'],['fees','Fees','fees'],['msa','MSA','msaStatus'],['process','Interview process','process']];
function buildTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML=`<button class="on" data-t="candidates" onclick="tab(this)">Candidates</button>`+
    HUBKEYS.map(h=>`<button data-t="${h[0]}" onclick="tab(this)">${esc(h[1])}</button>`).join('');
}
function tab(btn){document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  const t=btn.dataset.t,hub=document.getElementById('hub');
  if(t==='candidates'){hub.style.display='none';return;}
  const h=HUBKEYS.find(x=>x[0]===t);const body=(ROOM.hub&&ROOM.hub[h[2]])||'—';
  hub.style.display='block';hub.innerHTML=`<div class="lbl">${esc(h[1]).toUpperCase()}</div><div class="rule"></div><div style="font-size:13.5px;line-height:1.55;color:#cdd6df">${esc(body)}</div>`;
}
function render(){
  const b=document.getElementById('board');b.innerHTML='';
  (ROOM.stages||[]).forEach(st=>{
    const items=(ROOM.candidates||[]).filter(c=>c.stage===st.id);
    const col=document.createElement('div');col.className='col';col.dataset.stage=st.id;
    col.ondragover=e=>e.preventDefault();
    col.ondrop=e=>{e.preventDefault();move(e.dataTransfer.getData('id'),st.id);};
    col.innerHTML=`<h3>${esc(st.label)} <span class="cnt">${items.length}</span></h3><div class="barunder"></div>`+items.map(card).join('');
    b.appendChild(col);
  });
  renderFeed();renderChat();
}
function photoOrInitials(c,size){const ini=esc((c.name||'?').split(' ').map(w=>w[0]).slice(0,2).join(''));
  return c.photo?`<img src="${esc(c.photo)}" alt="" style="width:${size}px;height:${size}px;border-radius:${size>40?'12px':'8px'};object-fit:cover;border:1px solid var(--line);flex:0 0 auto">`
    :`<div style="width:${size}px;height:${size}px;border-radius:${size>40?'12px':'8px'};background:linear-gradient(135deg,#3a2a10,#2b333d);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;color:var(--gold);border:1px solid var(--line);flex:0 0 auto;font-size:${size>40?'22px':'12px'}">${ini}</div>`;}
function card(c){return `<div class="card" draggable="true" ondragstart="event.dataTransfer.setData('id','${c.id}')" onclick="openD('${c.id}')">
  <div style="display:flex;gap:8px;align-items:center">${photoOrInitials(c,34)}<div class="nm" style="line-height:1.2">${esc(c.name)}<br><span class="stars">${stars(c.rating)}</span></div></div>
  <div class="hl" style="margin-top:6px">${esc(c.headline||'Recruitment consultant')}</div>
  ${(c.niche||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
  <div class="cost">${money(c.cost)}/mo</div></div>`;}
async function move(id,stage){const c=(ROOM.candidates||[]).find(x=>x.id===id);if(!c||c.stage===stage)return;
  const lbl=(ROOM.stages.find(s=>s.id===stage)||{}).label;c.stage=stage;render();
  toast(`Moved ${c.name} → ${lbl}. Team notified.`);
  const j=await api('roomMove',{candidateId:id,stage,viewer:VIEWER.name});if(j.room)ROOM=j.room,render();}
function renderFeed(){const f=ROOM.activity||[];document.getElementById('feed').innerHTML=f.length?f.slice(0,12).map(x=>`<div class="act">${esc(x.text)}<div class="t">${fmtT(x.ts)}</div></div>`).join(''):'<div class="act" style="border-color:var(--line);color:var(--muted)">No activity yet.</div>';}
function fmtT(ts){try{return new Date(ts).toLocaleString([], {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}catch(e){return''}}
function renderChat(){document.getElementById('chat').innerHTML=(ROOM.chat||[]).map(m=>msgHtml(m)).join('')||'<div class="muted" style="font-size:12px">No messages yet.</div>';}
function msgHtml(m){return `<div class="msg"><div class="who">${esc(m.who)} <span>· ${esc(m.side||'')} · ${fmtT(m.ts)}</span></div><div>${esc(m.body)}</div>`+
  (m.replies||[]).map(r=>`<div class="reply"><div class="who">${esc(r.who)} <span>· ${esc(r.side||'')} · ${fmtT(r.ts)}</span></div><div>${esc(r.body)}</div></div>`).join('')+`</div>`;}
async function send(){const i=document.getElementById('msg');const v=i.value.trim();if(!v)return;i.value='';
  const j=await api('roomComment',{body:v,viewer:VIEWER.name,side:'Client'});if(j.room){ROOM=j.room;renderChat();renderFeed();}}
function openD(id){const c=(ROOM.candidates||[]).find(x=>x.id===id);if(!c)return;
  api('roomView',{candidateId:id,name:VIEWER.name,email:VIEWER.email,seconds:0});
  const cvUrl='/.netlify/functions/cv?w='+encodeURIComponent(ROOM_ID)+'&c='+encodeURIComponent(id);
  const d=document.getElementById('dpad');
  d.innerHTML=`<div style="display:flex;gap:14px;align-items:center">
    ${photoOrInitials(c,66)}
    <div><div class="dname">${esc(c.name)} <span class="stars">${stars(c.rating)}</span></div>
    <div class="muted" style="font-size:12.5px">${esc(c.headline||'Recruitment consultant')}</div>
    <div class="muted" style="font-size:12px">${esc(c.location||'')}${c.linkedin?' · <a href="https://linkedin.com/in/'+esc(c.linkedin)+'" target="_blank">LinkedIn ↗</a>':''}</div></div></div>
    <div class="acts">
      <button class="btn sm" onclick="act('${c.id}','Interview requested')">Request interview</button>
      <button class="btn sm ghost" onclick="act('${c.id}','2nd interview requested')">2nd interview</button>
      <button class="btn sm ghost" onclick="act('${c.id}','Offer initiated')">Make offer</button>
      <button class="btn sm ghost" style="border-color:#5a2b28;color:#e88" onclick="act('${c.id}','Not for us')">Not for us</button>
    </div>
    <div class="kv"><span class="k">Monthly cost (all-in)</span><span style="color:var(--gold);font-weight:700">${money(c.cost)}/mo</span></div>
    <div class="kv"><span class="k">Rec-Niche</span><span>${(c.niche||[]).join(', ')||'—'}</span></div>
    <div class="kv"><span class="k">Rec-Scope</span><span>${(c.scope||[]).join(', ')||'—'}</span></div>
    ${c.mkt?`<div class="kv"><span class="k">Market experience</span><span>${c.mkt.join(', ')}</span></div>`:''}
    <div class="kv"><span class="k">Education</span><span style="text-align:right;max-width:230px">${esc(c.edu||'—')}</span></div>
    <div class="lbl" style="margin:16px 0 4px">EXPERIENCE</div><div class="rule"></div>
    ${(c.exp&&c.exp.length)?c.exp.map(e=>`<div class="exp"><b>${esc(e[0])}</b><div class="c">${esc(e[1])} · ${esc(e[2])}</div></div>`).join(''):'<div class="exp muted">Profile being finalised.</div>'}
    <div style="margin-top:16px;display:flex;gap:6px;flex-wrap:wrap">
      ${c.hasCV?`<button class="btn" onclick="downloadCv('${c.id}')">⬇ Download CV</button>`:`<button class="btn ghost" onclick="act('${c.id}','Requested CV')">Request CV</button>`}
      ${ROOM.calendlyUrl?`<a class="btn ghost" href="${esc(ROOM.calendlyUrl)}" target="_blank">📅 Schedule interview</a>`:''}
    </div>
    <div class="note">Photo, CV file &amp; the all-in fee come from Untapped's side; everything else is synced from Atlas.</div>`;
  document.getElementById('scrim').classList.add('open');document.getElementById('drawer').classList.add('open');
}
function closeD(){document.getElementById('scrim').classList.remove('open');document.getElementById('drawer').classList.remove('open');}
function downloadCv(id){const url='/.netlify/functions/cv?w='+encodeURIComponent(ROOM_ID)+'&c='+encodeURIComponent(id);window.open(url,'_blank');toast('Opening CV…');api('roomCvDownload',{candidateId:id,viewer:VIEWER.name});}
async function act(id,label){const c=(ROOM.candidates||[]).find(x=>x.id===id);toast(`${label} — ${c.name}. Team notified.`);closeD();
  const j=await api('roomAction',{candidateId:id,actionLabel:label,viewer:VIEWER.name});if(j.room){ROOM=j.room;render();}}
let tt;function toast(m){let e=document.getElementById('toast');if(!e){e=document.createElement('div');e.id='toast';e.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--bg);font-weight:700;padding:10px 16px;border-radius:10px;z-index:50;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.4);transition:.3s';document.body.appendChild(e);}e.textContent=m;e.style.opacity=1;clearTimeout(tt);tt=setTimeout(()=>e.style.opacity=0,2600);}
boot();
</script>
</body></html>
