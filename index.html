<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untapped — Global talent, teammates not outsources</title>
<style>
  /* Landing page — mobile responsiveness (guaranteed in head) */
  @media (max-width:640px){
    .lp-hero{padding-top:40px !important}
    .lp-hero h1{font-size:30px !important; line-height:1.12 !important}
    .lp-hero .sub, .lp-hero p{font-size:15px !important}
    .lp-proof{grid-template-columns:repeat(2,1fr) !important}
    .lp-steps{grid-template-columns:1fr !important}
  }
</style>
<style>
  :root{
    --black:#101820;--red:#DA291C;--orange:#FF6900;--yellow:#FFC600;--white:#FFFFFF;--red-bright:#FF5A48;
    --ink:#fff;--ink-soft:rgba(255,255,255,.66);--ink-faint:rgba(255,255,255,.4);
    --rule:rgba(255,255,255,.85);--line:rgba(255,255,255,.16);--line-soft:rgba(255,255,255,.08);--surface:rgba(255,255,255,.025);
    --heat:linear-gradient(90deg,#FFC600,#FF6900,#DA291C);
    --sans:"Helvetica Neue",Helvetica,Arial,-apple-system,BlinkMacSystemFont,sans-serif;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box}
  html{background:var(--black)}
  body{margin:0;font-family:var(--sans);background:var(--black);color:var(--ink);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
  .lab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
  .muted{color:var(--ink-soft)}
  h1{font-family:var(--serif);font-weight:400;letter-spacing:-.01em;margin:.1em 0}
  h2{font-family:var(--serif);font-weight:400;font-size:24px;margin:0}
  h3{font-family:var(--serif);font-weight:400;font-size:19px;margin:0}
  a{color:var(--yellow)}
  header.top{position:sticky;top:0;z-index:30;background:rgba(16,24,32,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-soft)}
  .topin{max-width:1000px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:14px}
  #logo{height:20px}
  .topin .who{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--ink-soft)}
  .lock{background:transparent;border:1px solid var(--line);color:var(--ink-soft);border-radius:999px;padding:7px 14px;font:inherit;font-size:12px;cursor:pointer}
  .lock:hover{border-color:#fff;color:#fff}
  .wrap{max-width:1000px;margin:0 auto;padding:30px 24px 90px}
  .center{min-height:78vh;display:grid;place-items:center}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:30px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:22px;margin-top:16px}
  .heatrule{height:4px;width:120px;background:var(--heat);border-radius:2px;margin-bottom:18px}
  label.fl{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 6px}
  input,select,textarea{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:4px;color:#fff;font:inherit;font-size:15px;padding:11px 13px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#fff;background:rgba(255,255,255,.07)}
  select option{background:#101820}
  textarea{min-height:64px;resize:vertical;line-height:1.5}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}
  .btn{appearance:none;border:1px solid var(--white);background:var(--white);color:var(--black);font-weight:700;font-size:14px;letter-spacing:.02em;padding:12px 22px;border-radius:4px;cursor:pointer;transition:.15s}
  .btn:hover{background:#e9e9e9}.btn:disabled{background:transparent;color:var(--ink-faint);border-color:var(--line);cursor:not-allowed}
  .btn.ghost{background:transparent;color:#fff;border-color:var(--line)}.btn.ghost:hover{background:rgba(255,255,255,.06)}
  .btn.sm{padding:8px 14px;font-size:12px;border-radius:3px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .pin{letter-spacing:.5em;text-align:center;font-size:20px}
  .err{color:var(--red-bright);font-size:13px;min-height:18px;margin-top:8px}
  .ok{color:var(--yellow);font-size:13px;min-height:18px;margin-top:8px}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:14px 0 4px;flex-wrap:wrap}
  .tab{background:transparent;border:none;color:var(--ink-soft);font:inherit;font-size:14px;font-weight:600;padding:11px 15px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:#fff;border-bottom-color:var(--yellow)}
  /* roster */
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:8px}
  .ccard{border:1px solid var(--line);border-radius:8px;padding:18px;background:var(--surface);cursor:pointer;transition:.15s}
  .ccard:hover{border-color:#fff;transform:translateY(-2px)}
  .ccard .nm{font-weight:700;font-size:16px}
  .ccard .meta{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .pillrag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-top:12px}
  .rag-hi{background:rgba(255,198,0,.16);color:var(--yellow)} .rag-mid{background:rgba(255,105,0,.18);color:var(--orange)} .rag-lo{background:rgba(218,41,28,.18);color:var(--red-bright)} .rag-na{background:rgba(255,255,255,.08);color:var(--ink-soft)}
  .ccard .pct{float:right;font-family:var(--serif);font-size:26px}
  .ccard .alert{color:var(--red-bright);font-size:12px;margin-top:8px}
  /* dashboard */
  .dash{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .ring{--p:0;width:118px;height:118px;border-radius:50%;flex:none;background:conic-gradient(from -90deg,#FFC600 0%,#FF6900 calc(var(--p)*.5%),#DA291C calc(var(--p)*1%),rgba(255,255,255,.1) 0);display:grid;place-items:center}
  .ring i{width:92px;height:92px;border-radius:50%;background:var(--black);display:grid;place-items:center;font-family:var(--serif);font-size:25px;font-style:normal}
  .mini{display:flex;gap:24px;flex-wrap:wrap}.mini div b{display:block;font-family:var(--serif);font-size:23px}.mini div span{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft)}
  .trend{display:flex;gap:3px;align-items:flex-end;height:46px;margin-top:8px}
  .trend .b{flex:1;background:var(--heat);border-radius:2px 2px 0 0;min-height:2px;opacity:.85}
  .kpi{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line-soft)}.kpi:last-child{border-bottom:none}
  .kpi .info{flex:1;min-width:0}.kpi .info .nm{font-weight:600}.kpi .info .tg{font-size:12px;color:var(--ink-soft)}
  .kpi .num{width:90px}.kpi .num input{text-align:center}
  .kpi .bar{height:5px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin-top:7px}.kpi .bar>i{display:block;height:100%;background:var(--heat);width:0;transition:width .3s}
  .chk{width:26px;height:26px;border:1.5px solid var(--ink-faint);border-radius:6px;cursor:pointer;display:grid;place-items:center;background:transparent;flex:none;padding:0}
  .chk::after{content:"✓";color:var(--black);font-size:15px;font-weight:800;opacity:0}.chk.on{background:var(--yellow);border-color:var(--yellow)}.chk.on::after{opacity:1}
  .erow{display:grid;grid-template-columns:1fr 130px 90px 36px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line-soft)}.erow:last-child{border-bottom:none}
  .del{background:transparent;border:1px solid var(--line);color:var(--ink-soft);border-radius:4px;height:38px;cursor:pointer}.del:hover{border-color:var(--red-bright);color:var(--red-bright)}
  @media(max-width:560px){.erow{grid-template-columns:1fr 1fr}}
  .periodnav{display:flex;align-items:center;gap:12px;margin:16px 0 4px}
  .periodnav button{background:transparent;border:1px solid var(--line);color:#fff;border-radius:4px;width:34px;height:34px;cursor:pointer;font-size:16px}.periodnav button:hover{border-color:#fff}
  .periodnav .pl{font-weight:600}
  .item{padding:12px 0;border-bottom:1px solid var(--line-soft)}.item:last-child{border-bottom:none}
  .item .when{font-size:11px;color:var(--ink-faint);letter-spacing:.04em}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--ink-soft)}
  .badge.open{background:rgba(218,41,28,.18);color:var(--red-bright)}
  .share{font-size:13px;background:rgba(255,255,255,.04);border:1px solid var(--line-soft);border-radius:6px;padding:12px 14px;margin-top:10px;word-break:break-all}
  .share b{color:#fff}
  .scale{display:flex;gap:6px;margin-top:6px}
  .scale button{flex:1;background:transparent;border:1px solid var(--line);color:var(--ink-soft);border-radius:4px;padding:9px 0;cursor:pointer}
  .scale button.on{background:var(--yellow);border-color:var(--yellow);color:var(--black);font-weight:700}
  .empty{color:var(--ink-soft);padding:22px 0;text-align:center;font-size:14px}
  .sechdr{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-top:6px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;color:#101820;font-weight:600;font-size:13px;padding:10px 18px;border-radius:999px;opacity:0;transition:.2s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
</style>
</head>
<body>

  <img id="logo" alt="Untapped">
  <div class="who" id="who"></div>
</div></header>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

const PERIODS=[['daily','Daily'],['weekly','Weekly'],['monthly','Monthly']];
function today(){return new Date().toISOString().slice(0,10);}
function monthKey(d){return d.toISOString().slice(0,7);}
function weekKey(d){const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-day);const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));const wk=Math.ceil(((t-ys)/86400000+1)/7);return t.getUTCFullYear()+'-W'+String(wk).padStart(2,'0');}
function completion(kpis,logs,period,pk){const list=(kpis&&kpis[period])||[];if(!list.length)return null;const log=((logs&&logs[period])||{})[pk]||{};let s=0;list.forEach(it=>{const v=log[it.id];if(it.type==='check')s+=v?1:0;else s+=it.target?Math.min(1,(Number(v)||0)/it.target):(v?1:0);});return Math.round(100*s/list.length);}
function ragClass(p){return p==null?'rag-na':p>=75?'rag-hi':p>=50?'rag-mid':'rag-lo';}
function ragText(p){return p==null?'No data':p>=75?'On track':p>=50?'Watch':'At risk';}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}
const uid=()=>Math.random().toString(36).slice(2,8);

/* time off: 2026 public holidays (excluded from allowance) + day maths */
const HOLIDAYS={
 'South Africa':{'2026-01-01':"New Year's Day",'2026-03-21':'Human Rights Day','2026-04-03':'Good Friday','2026-04-06':'Family Day','2026-04-27':'Freedom Day','2026-05-01':"Workers' Day",'2026-06-16':'Youth Day','2026-08-10':"National Women's Day (observed)",'2026-09-24':'Heritage Day','2026-12-16':'Day of Reconciliation','2026-12-25':'Christmas Day','2026-12-26':'Day of Goodwill'},
 'Philippines':{'2026-01-01':"New Year's Day",'2026-02-17':'Chinese New Year','2026-04-02':'Maundy Thursday','2026-04-03':'Good Friday','2026-04-04':'Black Saturday','2026-04-09':'Araw ng Kagitingan','2026-05-01':'Labor Day','2026-06-12':'Independence Day','2026-08-21':'Ninoy Aquino Day','2026-08-31':'National Heroes Day','2026-11-01':"All Saints' Day",'2026-11-30':'Bonifacio Day','2026-12-08':'Immaculate Conception','2026-12-25':'Christmas Day','2026-12-30':'Rizal Day','2026-12-31':'Last Day of the Year'}
};
function isoDate(d){return d.toISOString().slice(0,10);}
function workDays(start,end,loc){
 if(!start||!end)return{days:0,skipped:[]};
 const s=new Date(start+'T00:00:00Z'),e=new Date(end+'T00:00:00Z');
 if(isNaN(s)||isNaN(e))return{days:0,skipped:[]};
 if(e<s)return{days:0,skipped:[],invalid:true};
 let days=0;const skipped=[];
 for(let d=new Date(s);d<=e;d.setUTCDate(d.getUTCDate()+1)){const wd=d.getUTCDay();if(wd===0||wd===6)continue;const h=HOLIDAYS[loc]&&HOLIDAYS[loc][isoDate(d)];if(h){skipped.push(h);continue;}days++;}
 return{days,skipped};
}
function toBooked(c){return (c.timeoff||[]).filter(r=>r.status==='approved').reduce((t,r)=>t+workDays(r.start,r.end,c.location).days,0);}
function toPending(c){return (c.timeoff||[]).filter(r=>r.status==='pending').reduce((t,r)=>t+workDays(r.start,r.end,c.location).days,0);}
function fmtD(s){return new Date(s+'T00:00:00Z').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}

let wsId=null, pin=null, role=null, WS=null, ME=null, company='';
let activeId=null, tab='daily', cTab='dash', cView='dashboard';
let OB=null; // onboarding funnel status (public, pre-PIN)

function saveSession(){try{localStorage.setItem('untapped_kpi_session',JSON.stringify({wsId,pin}))}catch(e){}}
function clearSession(){try{localStorage.removeItem('untapped_kpi_session')}catch(e){}}
async function api(action,extra={}){
  const r=await fetch(CONFIG.endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,wsId,pin,...extra})});
  let j={}; try{j=await r.json()}catch(e){}
  if(!r.ok) j.error=j.error||('HTTP '+r.status);
  return j;
}
async function refresh(){
  const j=await api('get');
  if(!j.ok){ role=null; return false; }
  role=j.role;
  if(role==='customer'||role==='admin'){ WS=j.workspace; if(!activeId&&WS.candidates[0]) activeId=WS.candidates[0].id; }
  else { ME=j.candidate; company=j.company; }
  return true;
}

/* ---------- routing ---------- */
async function init(){
  const u=new URL(location.href); const w=u.searchParams.get('w');
  const obParam=u.searchParams.get('ob'), sid=u.searchParams.get('sid');
  let sess=null; try{sess=JSON.parse(localStorage.getItem('untapped_kpi_session')||'null')}catch(e){}
  if(w) wsId=w; else if(sess&&sess.wsId) wsId=sess.wsId;
  // Returning staff/client with a saved PIN go straight in (this also bypasses the funnel).
  if(wsId && sess && sess.wsId===wsId && sess.pin){ pin=sess.pin; if(await refresh()){ route(); return; } }
  if(!wsId){ landing(); return; }
  // Onboarding gate — sits in front of PIN entry.
  const os=await api('onboardingStatus'); OB=os&&os.onboarding;
  if(OB && OB.required && OB.status!=='complete'){
    if(obParam==='paid' && sid){ return obVerify(sid); }
    return obFunnel(obStepFor(OB));
  }
  unlock();
}
function obStepFor(o){ if(!o.signed) return 'welcome'; if(!o.paid) return 'pay'; if(!o.questionnaireDone) return 'quiz'; if(!o.booked) return 'book'; if(!o.hired) return 'shortlist'; if(!o.woDone) return 'workorder'; if(!o.ddDone) return 'directdebit'; return 'done'; }

function route(){
  try{ if(wsId) history.replaceState(null,'',location.pathname+'?w='+wsId); }catch(e){} // keep recoverable link in the address bar
  const roleLabel=role==='admin'?'Untapped admin':role==='customer'?'Customer':'Candidate';
  who.innerHTML=`<span>${(role==='customer'||role==='admin')?esc(WS.company||'Customer'):esc(company)} · ${roleLabel}</span><button class="lock" onclick="App.lock()">Lock</button>`;
  if(role==='customer'||role==='admin') customerApp(); else candidateApp();
}

  decideTO:async(cid,rid,status)=>{const j=await api('decideTimeoff',{candidateId:cid,requestId:rid,status});if(j.ok){await refresh();renderDetail();toast('Time off '+status);}else toast(j.error||'Failed');},
  // time off — candidate
  recalcTO:()=>{const s=$('#to_s'),e=$('#to_e'),box=$('#to_calc');if(!s||!e||!box)return;if(!s.value||!e.value){box.textContent='Pick your dates to see how many days this uses.';return;}const calc=workDays(s.value,e.value,ME.location);if(calc.invalid){box.innerHTML='<span style="color:#ff9a92">End date is before the start date.</span>';return;}let note='Weekends excluded.';if(calc.skipped.length)note+=' Public holidays not counted: '+[...new Set(calc.skipped)].join(', ')+'.';box.innerHTML='<b style="color:#FFC600">'+calc.days+' working day'+(calc.days===1?'':'s')+'</b> will be deducted if approved.<div style="font-size:12.5px;margin-top:3px">'+note+'</div>';},
  submitTO:async()=>{const s=$('#to_s').value,e=$('#to_e').value,r=$('#to_r').value.trim();const calc=workDays(s,e,ME.location);if(!s||!e||calc.invalid||calc.days<1){$('#to_err').textContent='Pick a valid date range with at least one working day.';return;}const j=await api('submitTimeoff',{start:s,end:e,reason:r});if(j.ok){await refresh();renderKBody();toast('Request submitted');}else $('#to_err').textContent=j.error||'Failed';},
  cancelTO:async(rid)=>{const j=await api('cancelTimeoff',{requestId:rid});if(j.ok){await refresh();renderKBody();toast('Cancelled');}},
  // commissions (customer)
  addComm:async()=>{const amount=$('#cm_a').value;if(!amount||Number(amount)<=0){$('#cm_err').textContent='Enter an amount greater than 0.';return;}const j=await api('addCommission',{candidateId:$('#cm_c').value,amount,type:$('#cm_t').value,note:$('#cm_n').value.trim(),month:$('#cm_m').value});if(j.ok){await refresh();renderCommissions();toast('Added');}else $('#cm_err').textContent=j.error||'Failed';},
  delComm:async(id)=>{const j=await api('deleteCommission',{commissionId:id});if(j.ok){await refresh();renderCommissions();toast('Removed');}},
  saveOnboarding:async()=>{ const required=$('#ob_req').checked, retainerPerHire=$('#ob_ret').value, hires=$('#ob_hires').value, vat=$('#ob_vat').checked, region=$('#ob_region').value; const j=await api('setOnboardingConfig',{required,retainerPerHire,hires,vat,region}); if(j.ok){await refresh();renderOnboardingAdmin();toast('Onboarding settings saved');} else toast(j.error||'Failed'); },
  obTotalPreview:()=>{ const p=Number($('#ob_ret').value)||0, h=Math.max(1,Number($('#ob_hires').value)||1), v=$('#ob_vat').checked; const base=p*h, tot=v?base*1.2:base; const t=$('#ob_total'); if(t)t.textContent='£'+tot.toFixed(2); const b=$('#ob_break'); if(b)b.textContent='(£'+p+' × '+h+(v?' + VAT':'')+')'; },
  saveAdminPin:async()=>{ const v=$('#ob_apin').value.trim(), err=$('#ob_apin_err'); if(!/^\d{4}$/.test(v)){err.textContent='PIN must be 4 digits.';return;} const j=await api('setAdminPin',{newAdminPin:v}); if(j.ok){alert('Admin PIN set. From now on, open onboarding settings by unlocking with this admin PIN — the client PIN no longer shows them.');clearSession();location.search='?w='+wsId;} else err.textContent=j.error||'Failed'; },
  resetOnboarding:async()=>{ if(!confirm('Reset this client’s onboarding? They’ll need to sign, pay and complete the questionnaire again.'))return; const j=await api('resetOnboarding'); if(j.ok){await refresh();renderOnboardingAdmin();toast('Onboarding reset');} else toast(j.error||'Failed'); },
  deleteWorkspace:async()=>{ const t=prompt('This permanently deletes this workspace and ALL its data. Type DELETE to confirm.'); if(t!=='DELETE'){ if(t!==null)toast('Not deleted — you must type DELETE'); return; } const j=await api('deleteWorkspace',{confirm:'DELETE'}); if(j.ok){ clearSession(); pin=null;role=null;WS=null; alert('Workspace deleted.'); location.search=''; } else toast(j.error||'Failed'); },
  obGo:(s)=>obFunnel(s),
  obStaff:()=>{ try{history.replaceState(null,'',location.pathname+'?w='+wsId);}catch(e){} unlock(); },
  obMsaPreview:()=>{ clearTimeout(App._msaT); App._msaT=setTimeout(()=>{ const f=document.getElementById('msaframe'); if(!f)return; const region=(OB&&OB.region)||''; const src=region==='Philippines'?'msa-philippines.html':region==='South Africa'?'msa-south-africa.html':''; if(!src)return; const co=(document.getElementById('ob_company')||{}).value||'', reg=(document.getElementById('ob_reg')||{}).value||'', addr=(document.getElementById('ob_addr')||{}).value||''; f.src=src+'?company='+encodeURIComponent(co.trim())+'&reg='+encodeURIComponent(reg.trim())+'&addr='+encodeURIComponent(addr.trim()); },700); },
  obSign:async()=>{ const name=$('#ob_name').value.trim(), agree=$('#ob_agree').checked, err=$('#ob_err'); const company={name:$('#ob_company').value.trim(),regNumber:$('#ob_reg').value.trim(),address:$('#ob_addr').value.trim()}; if(!company.name){err.textContent='Please enter your company name.';return;} if(!company.regNumber){err.textContent='Please enter your company registration number.';return;} if(name.length<2){err.textContent='Please enter your full name.';return;} if(!agree){err.textContent='Please tick the box to agree.';return;} err.textContent=''; const j=await api('submitSignature',{name,company}); if(j.ok){OB=j.onboarding;obFunnel('pay');} else err.textContent=j.error||'Could not save your signature.'; },
  obPay:async()=>{ const err=$('#ob_err'); err.textContent='Opening secure payment…'; const j=await api('createCheckout'); if(j.ok&&j.url){ location.href=j.url; } else { err.textContent=j.error==='payment not configured'?'Payment isn’t switched on yet — please contact Untapped.':(j.error||'Could not start payment.'); } },
  obQuizDone:async()=>{ const j=await api('markQuestionnaireDone'); if(j.ok){OB=j.onboarding;obFunnel('book');} else toast(j.error||'Failed'); },
  obBooked:async()=>{ const j=await api('markBooked'); if(j.ok){OB=j.onboarding;obFunnel('shortlist');} else toast(j.error||'Failed'); },
  obRefresh:async()=>{ const j=await api('onboardingStatus'); if(j.ok){OB=j.onboarding;obFunnel(obStepFor(OB));} },
  shortAction:async(id,act)=>{ const labels={interview:'Interview requested',second:'2nd interview requested',offer:'Offer sent to Untapped'}; const j=await api('shortlistAction',{candidateId:id,act}); if(j.ok){OB=j.onboarding;obFunnel('shortlist');toast(labels[act]||'Sent');} else toast(j.error||'Failed'); },
  reqCheckin:async()=>{ const note=prompt('Request a check-in with your delivery lead. Anything you’d like to cover? (optional)'); if(note===null)return; const j=await api('requestCheckin',{note}); toast(j.ok?'Check-in requested — your delivery lead will be in touch':(j.error||'Failed')); },
  obSubmitWO:async()=>{ const err=$('#wo_err'); const client={companyName:$('#wo_cn').value.trim(),companyRegNumber:$('#wo_rn').value.trim(),companyAddress:$('#wo_ad').value.trim(),contactName:$('#wo_ct').value.trim(),hiringManagerEmail:$('#wo_hm').value.trim(),accountsEmail:$('#wo_ac').value.trim()}; const name=$('#wo_sig').value.trim(); if(!client.companyName||!client.companyRegNumber){err.textContent='Please add your company name and registration number.';return;} if(!client.hiringManagerEmail||!client.accountsEmail){err.textContent='Please add both email addresses.';return;} if(name.length<2){err.textContent='Type your full name to sign.';return;} if(!$('#wo_agree').checked){err.textContent='Please tick to confirm.';return;} err.textContent=''; const j=await api('submitWorkOrder',{client,name}); if(j.ok){OB=j.onboarding;obFunnel(obStepFor(OB));toast('Work Order signed');} else err.textContent=j.error||'Failed'; },
  obDD:async()=>{ const j=await api('markDD'); if(j.ok){OB=j.onboarding;obFunnel('done');} else toast(j.error||'Failed'); },
  selfServeStart:()=>{ const f=document.getElementById('ss_form'); if(f){ f.style.display='block'; f.scrollIntoView({behavior:'smooth',block:'center'}); const c=document.getElementById('ss_company'); if(c)c.focus(); } },
  selfServeVat:()=>{ const v=document.getElementById('ss_vat').checked; const t=document.getElementById('ss_amount'); if(t)t.textContent = v?'£1,200':'£1,000'; },
  selfServeSubmit:async()=>{ const company=$('#ss_company').value.trim(), contact=$('#ss_contact').value.trim(), email=$('#ss_email').value.trim(), region=$('#ss_region').value, vat=$('#ss_vat').checked, err=$('#ss_err'), btn=$('#ss_btn'); if(company.length<2){err.textContent='Enter your company name.';return;} if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){err.textContent='Enter a valid email.';return;} if(!region){err.textContent='Please choose a region.';return;} err.textContent=''; btn.disabled=true; btn.textContent='Setting up…'; const j=await api('startSelfServe',{company,contact,email,region,vat}); if(j.ok&&j.wsId){ location.href='/?w='+j.wsId; } else { err.textContent=j.error||'Something went wrong — please try again.'; btn.disabled=false; btn.textContent='Continue to sign terms →'; } },
};
/* live auto-refresh for the customer dashboard (every 30s, paused when tab hidden or editing) */
async function autoTick(){
  if(role!=='customer'||document.hidden) return;
  const ae=document.activeElement;
  if(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) return; // don't clobber typing
  if(cView!=='dashboard') return;                              // not on the roster view (e.g. commissions)
  if(cTab==='kpis'||cTab==='kudos'||cTab==='timeoff') return;  // don't disturb editing/approval views
  if(await refresh() && role==='customer'){ renderRoster(); renderDetail(); }
}
setInterval(autoTick,30000);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) autoTick(); });
init();
</script>
