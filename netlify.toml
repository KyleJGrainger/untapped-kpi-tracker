# Untapped KPI Tracker — Netlify config
# Storage uses Netlify's built-in Blobs automatically (no explicit token needed).
[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/tracker"
  to = "/.netlify/functions/tracker"
  status = 200

# Weekly digest — Fridays 14:00 UTC. Adjust the cron as you like.
[functions."digest"]
  schedule = "0 14 * * 5"

# Commission reminders — 15th (reminder), 18th (final), 19th (summary to Untapped). 09:00 UTC.
[functions."commissions"]
  schedule = "0 9 15,18,19 * *"
